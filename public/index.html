<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Consultorio Psicológico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/psicologia.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
  <div class="form-wrapper">
    <!-- Lado izquierdo: Formulario de login -->
    <div class="form-side">
      <a href="#" title="Logo">
        <img src="assets/Logo.png" class="logo" alt="Logo Consultorio">
      </a>
      <form class="my-form" id="loginForm">
        <div class="form-welcome-row">
          <h1>Iniciar sesión</h1>
          <h2>Bienvenido al sistema de gestión psicológica</h2>
        </div>

        <!-- Campos de inicio de sesión -->
        <div class="text-field">
          <label for="email">Correo:</label>
          <input type="email" id="email" name="email" placeholder="usuario@consultorio.com" required>
        </div>

        <div class="text-field">
          <label for="password">Contraseña:</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <!-- Mensaje de error -->
        <div id="error-message" class="error-message" style="display: none;">
          <i class="bi bi-exclamation-circle"></i>
          <span id="error-text"></span>
        </div>

        <!-- Botón de envío -->
        <button type="submit" class="my-form__button">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>
    </div>

    <!-- Lado derecho: Imagen decorativa -->
    <div class="info-side">
      <img src="assets/consultorio.png" alt="Consultorio" class="mockup">
      <div class="mockup-overlay"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
