<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de Terapeutas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
            :root {
      --color-primario: #2563eb;
      --color-secundario: #1e40af;
      --sombra-suave: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    body {
      background: #f8fafc;
      min-height: 100vh;
    }

    .navbar-maestra {
      background: var(--color-primario) !important;
      box-shadow: var(--sombra-suave);
    }

    .sidebar {
      width: 250px;
      min-height: 100vh;
      position: fixed;
      left: -250px;
      transition: all 0.3s;
      background: #0d6efd;
      z-index: 1000;
    }

    .sidebar.active {
      left: 0;
    }

    .main-content {
      transition: margin-left 0.3s;
      padding: 20px;
    }

    .main-content.active {
      margin-left: 250px;
    }

    .formulario-contenedor {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: var(--sombra-suave);
    }

    .campo-formulario label {
      font-weight: 500;
      color: var(--color-secundario);
      margin-bottom: 0.5rem;
    }

    .campo-formulario input,
    .campo-formulario select {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.75rem;
      transition: border-color 0.3s;
    }

    .campo-formulario input:focus {
      border-color: var(--color-primario);
      box-shadow: none;
    }

    .menu-toggle {
      position: fixed;
      left: 15px;
      top: 15px;
      z-index: 999;
      cursor: pointer;
      background: white;
      border-radius: 5px;
      padding: 8px 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .floating-form {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
        .main-content {
            transition: all 0.3s;
            margin-left: 0;
        }
        .main-content.active {
            margin-left: 250px;
        }
        .menu-toggle {
            position: fixed;
            left: 15px;
            top: 15px;
            z-index: 999;
            cursor: pointer;
            background: white;
            border-radius: 5px;
            padding: 8px 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="py-4">

    <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-maestra">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <i class="bi bi-heart-pulse me-2"></i>Consultorio Psicológico
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="Lista_de_espera.html">
              <i class="bi bi-list-task me-1"></i>Lista de Espera
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reportes.html">
              <i class="bi bi-file-text me-1"></i>Reportes
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ingresar_pacientes.html">
              <i class="bi bi-person-plus me-1"></i>Nuevo Paciente
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ingresar_terapeuta.html">
              <i class="bi bi-briefcase me-1"></i>Nuevo Terapeuta
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>


    <!-- Contenido principal -->
    <div class="main-content">
        <div class="container">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Nuevo Terapeuta</h3>
                </div>
                <div class="card-body">
                    <form id="registroTerapeutaForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" class="form-control" name="nombre" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Apellido</label>
                                    <input type="text" class="form-control" name="apellido" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Correo Electrónico</label>
                                    <input type="email" class="form-control" name="correo" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Especialidad</label>
                                    <input type="text" class="form-control" name="especialidad" required>
                                </div>
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-success px-4">
                                    Registrar Terapeuta
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Función para mostrar/ocultar la barra lateral
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');
            sidebar.classList.toggle('active');
            mainContent.classList.toggle('active');
        }

        // Manejo del formulario
        document.getElementById('registroTerapeutaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/api/terapeutas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('Error al registrar');
                alert('Terapeuta registrado exitosamente!');
                e.target.reset();
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
