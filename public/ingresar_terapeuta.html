<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agregar Terapeuta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .floating-card {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="card floating-card">
      <div class="card-header bg-info text-white">
        <h3 class="mb-0">Nuevo Terapeuta</h3>
      </div>
      <div class="card-body">
        <form id="formTerapeuta">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" name="nombre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" name="apellido" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" name="correo" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Especialidad</label>
            <input type="text" class="form-control" name="especialidad" required>
          </div>
          <button type="submit" class="btn btn-info w-100">Registrar</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('formTerapeuta').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      
      try {
        const response = await fetch('/api/terapeutas', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (!response.ok) throw new Error('Error al registrar');
        alert('Terapeuta agregado!');
        e.target.reset();
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
