<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lista de Espera</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href='https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.8/main.min.css' rel='stylesheet'/>
  <link href='https://cdn.jsdelivr.net/npm/@fullcalendar/daygrid@6.1.8/main.min.css' rel='stylesheet'/>
  <style>
    body { background: linear-gradient(135deg, #6366f1 0%, #2563eb 100%); min-height: 100vh; }
    .main-container { background: rgba(255, 255, 255, 0.95); border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .list-group-item { transition: all 0.3s; border-left: 4px solid transparent; }
    .list-group-item:hover { transform: translateX(10px); border-left-color: #6366f1; }
  </style>
</head>
<body class="py-4">
  <div class="container">
    <div class="main-container p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-primary fw-bold">Lista de Espera</h1>
        <div class="d-flex gap-3">
          <select class="form-select" id="filtroTerapeutas" style="width: 250px;">
            <option value="">Todos los terapeutas</option>
          </select>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#nuevoPacienteModal">
            <i class="bi bi-plus-lg me-2"></i>Nuevo
          </button>
        </div>
      </div>
      
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="list-group" id="listaEspera"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let todosTerapeutas = [];

    async function cargarTerapeutas() {
      try {
        const response = await fetch('/api/terapeutas');
        todosTerapeutas = await response.json();
        actualizarFiltroTerapeutas();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function cargarListaEspera() {
      try {
        const response = await fetch('/api/lista-espera');
        const pacientes = await response.json();
        renderizarLista(pacientes);
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function renderizarLista(pacientes) {
      const lista = document.getElementById('listaEspera');
      lista.innerHTML = pacientes.map(paciente => `
        <div class="list-group-item mb-2">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h5 class="mb-1">${paciente.nombre} ${paciente.apellido}</h5>
              <div class="d-flex align-items-center gap-2">
                <span class="badge bg-warning">${paciente.estado}</span>
                ${paciente.terapeuta_nombre ? `<span class="badge bg-info">${paciente.terapeuta_nombre}</span>` : ''}
              </div>
            </div>
            <small class="text-muted">${new Date(paciente.fecha_solicitud).toLocaleDateString()}</small>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      cargarTerapeutas();
      cargarListaEspera();
    });
  </script>
</body>
</html>
