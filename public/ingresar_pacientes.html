<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro de Pacientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root {
      --color-primario: #2563eb;
      --color-secundario: #1e40af;
      --sombra-suave: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    body {
      background: #f8fafc;
      min-height: 100vh;
    }

    .navbar-maestra {
      background: var(--color-primario) !important;
      box-shadow: var(--sombra-suave);
    }

    .sidebar {
      width: 250px;
      min-height: 100vh;
      position: fixed;
      left: -250px;
      transition: all 0.3s;
      background: #0d6efd;
      z-index: 1000;
    }

    .sidebar.active {
      left: 0;
    }

    .main-content {
      transition: margin-left 0.3s;
      padding: 20px;
    }

    .main-content.active {
      margin-left: 250px;
    }

    .formulario-contenedor {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: var(--sombra-suave);
    }

    .campo-formulario label {
      font-weight: 500;
      color: var(--color-secundario);
      margin-bottom: 0.5rem;
    }

    .campo-formulario input,
    .campo-formulario select {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.75rem;
      transition: border-color 0.3s;
    }

    .campo-formulario input:focus {
      border-color: var(--color-primario);
      box-shadow: none;
    }

    .menu-toggle {
      position: fixed;
      left: 15px;
      top: 15px;
      z-index: 999;
      cursor: pointer;
      background: white;
      border-radius: 5px;
      padding: 8px 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .floating-form {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-maestra">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <i class="bi bi-heart-pulse me-2"></i>Consultorio Psicológico
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="Lista_de_espera.html">
              <i class="bi bi-list-task me-1"></i>Lista de Espera
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reportes.html">
              <i class="bi bi-file-text me-1"></i>Reportes
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ingresar_pacientes.html">
              <i class="bi bi-person-plus me-1"></i>Nuevo Paciente
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ingresar_terapeuta.html">
              <i class="bi bi-briefcase me-1"></i>Nuevo Terapeuta
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Menú lateral -->
  <div class="menu-toggle" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </div>

  <nav class="sidebar bg-primary text-white">
    <div class="p-3">
      <h4>Consultorio Psicológico</h4>
      <button class="btn btn-light btn-sm mb-3" onclick="toggleSidebar()">
        <i class="bi bi-x-lg"></i>
      </button>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link text-white" href="Lista_de_espera.html">Lista de Espera</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white" href="ingresar_pacientes.html">Registrar Pacientes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white" href="ingresar_terapeuta.html">Registrar Terapeutas</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="main-content">
    <div class="formulario-contenedor">
      <h2 class="mb-4 text-center">
        <i class="bi bi-person-plus me-2"></i>Registro de Paciente
      </h2>
      
      <div class="card shadow floating-form">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Nuevo Paciente</h3>
        </div>
        <div class="card-body">
          <form id="registroForm">
            <div class="row g-3">
              <!-- Columna Izquierda -->
              <div class="col-md-6">
                <div class="mb-3 campo-formulario">
                  <label class="form-label">Nombre</label>
                  <input type="text" class="form-control" name="nombre" required>
                </div>
                <div class="mb-3 campo-formulario">
                  <label class="form-label">Apellido</label>
                  <input type="text" class="form-control" name="apellido" required>
                </div>
                <div class="mb-3 campo-formulario">
                  <label class="form-label">Cédula</label>
                  <input type="text" class="form-control" name="cedula" required>
                </div>
              </div>

              <!-- Columna Derecha -->
              <div class="col-md-6">
                <div class="mb-3 campo-formulario">
                  <label class="form-label">Correo Electrónico</label>
                  <input type="email" class="form-control" name="correo" required>
                </div>
                <div class="mb-3 campo-formulario">
                  <label class="form-label">Tipo de Atención</label>
                  <select class="form-select" name="tipo_atencion" required>
                    <option value="Individual">Individual</option>
                    <option value="Pareja">Pareja</option>
                    <option value="Familiar">Familiar</option>
                  </select>
                </div>
                <div class="mb-3 campo-formulario">
                  <label class="form-label">Terapeuta Asignado</label>
                  <select class="form-select" name="terapeuta_id" id="terapeutasDropdown">
                    <option value="">Seleccionar terapeuta...</option>
                  </select>
                </div>
              </div>

              <!-- Botón de envío -->
              <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary px-4">
                  <i class="bi bi-save me-2"></i> Registrar
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('active');
      document.querySelector('.main-content').classList.toggle('active');
    }

    async function cargarTerapeutas() {
      try {
        const response = await fetch('/api/terapeutas');
        const terapeutas = await response.json();
        const dropdown = document.getElementById('terapeutasDropdown');
        
        dropdown.innerHTML = '<option value="">Seleccionar terapeuta...</option>' + 
          terapeutas.map(t => `
            <option value="${t.id_terapeuta}">
              ${t.nombre} ${t.apellido}
            </option>
          `).join('');
      } catch (error) {
        console.error('Error cargando terapeutas:', error);
        alert('Error al cargar la lista de terapeutas');
      }
    }

    document.addEventListener('DOMContentLoaded', cargarTerapeutas);

    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      try {
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const response = await fetch('/api/pacientes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!response.ok) throw new Error(await response.text());
        
        alert('Registro exitoso!');
        window.location.href = 'Lista_de_espera.html';
      } catch (error) {
        console.error('Error:', error);
        alert('Error al registrar: ' + error.message);
      }
    });
  </script>
</body>
</html>
